<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SSH Terminal</title>
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #terminal { position: absolute; inset: 0; padding: 4px; box-sizing: border-box; }
    </style>
    <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
    <!-- Shared AES-GCM key for the optional epassword parameter -->
    <script src="/sheasy-config.js"></script>
    <script src="wasm_exec.js"></script>
  </head>
  <body>
    <div id="terminal"></div>
    <script>
// Minimal terminal-only SSH page for embedding (e.g. the Zabbix switches
// "Macros . CLI" tab). It reuses the same main.wasm SSH client as index.html
// but drops the connection form, file browser, modals, jQuery and Bootstrap.
//
// URL parameters (all optional except host):
//   host, port, user, password, pk   - connection details
//   epassword                        - AES-256-GCM password (see README)
//   readonly=1                       - drop typed input except Ctrl-C
//   origin=<parent-origin>           - enable postMessage bridge
//   cmd=<base64>                     - command to run once connected
//   bypassProxy=1, bypassFingerprint=1
//
// postMessage protocol (when origin is set) mirrors index.html embed mode:
//   iframe -> parent: {type:"status", state:"loaded|connected|disconnected|error", msg}
//                     {type:"pong"}
//   parent -> iframe: {type:"run", cmd} | {type:"interrupt"} | {type:"ping"}
(function () {
  var params = new URLSearchParams(window.location.search);
  var host = params.get("host");
  var port = params.get("port") || 22;
  var user = params.get("user");
  var password = params.get("password");
  var epassword = params.get("epassword") || "";
  var pk = params.get("pk") || "";
  var readonly = params.get("readonly") === "1";
  var allowedOrigin = params.get("origin") || "";
  var bypassProxy = params.get("bypassProxy") === "1";
  var bypassFingerprint = params.get("bypassFingerprint") === "1";
  var initialCmd = "";
  if (params.get("cmd")) {
    try { initialCmd = atob(params.get("cmd")); }
    catch (e) { console.warn("terminal: invalid base64 cmd"); }
  }

  // --- xterm setup ---
  var term = new Terminal({ cursorBlink: true, fontSize: 13 });
  var fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById("terminal"));
  fitAddon.fit();
  window.term = term; // main.wasm reads this global

  var keyCb = null;          // SSH stdin writer, captured when WASM registers it
  var connectedFlag = false;
  var reconnecting = false;

  // Wrap onData so we can capture the WASM-registered stdin writer, enforce
  // readonly mode, and expose a raw (unfiltered) registrar for prompts.
  var rawOnData = term.onData.bind(term);
  term.onData = function (cb) {
    keyCb = cb;
    return rawOnData(function (data) {
      if (readonly && data !== "\x03") return; // allow Ctrl-C only
      cb(data);
    });
  };

  // --- postMessage bridge ---
  function post(msg) {
    if (!allowedOrigin || window.parent === window) return;
    try { window.parent.postMessage(msg, allowedOrigin); } catch (e) {}
  }
  function sshRun(cmd) {
    if (!keyCb) { console.warn("terminal: sshRun before session is up"); return false; }
    if (!cmd.endsWith("\n") && !cmd.endsWith("\r")) cmd += "\n";
    keyCb(cmd);
    return true;
  }
  window.sshRun = sshRun;
  window.addEventListener("message", function (ev) {
    if (allowedOrigin && ev.origin !== allowedOrigin) return;
    var d = ev.data;
    if (!d || typeof d !== "object") return;
    if (d.type === "run" && typeof d.cmd === "string") sshRun(d.cmd);
    else if (d.type === "interrupt") { if (keyCb) keyCb("\x03"); }
    else if (d.type === "ping") post({ type: "pong" });
  });

  // --- resize ---
  var ro = new ResizeObserver(function () {
    fitAddon.fit();
    if (connectedFlag && typeof window.changeWindowSize === "function") {
      window.changeWindowSize(term.rows, term.cols);
    }
  });
  ro.observe(document.getElementById("terminal"));

  // --- crypto helpers (AES-256-GCM epassword) ---
  function base64UrlDecode(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    var bin = atob(s);
    var out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function hexToBytes(hex) {
    if (hex.length % 2) throw new Error("decryption key must be hex");
    var out = new Uint8Array(hex.length / 2);
    for (var i = 0; i < out.length; i++) {
      var b = parseInt(hex.substr(i * 2, 2), 16);
      if (Number.isNaN(b)) throw new Error("decryption key must be hex");
      out[i] = b;
    }
    return out;
  }
  async function decryptEPassword(ep) {
    if (!window.SSHEASY_KEY) throw new Error("server has no decryption key configured (set SSHEASY_DECRYPT_KEY)");
    if (!window.crypto || !window.crypto.subtle) throw new Error("Web Crypto unavailable (serve over https or localhost)");
    var keyBytes = hexToBytes(window.SSHEASY_KEY);
    if (keyBytes.length !== 32) throw new Error("decryption key must be 32 bytes (64 hex chars)");
    var raw = base64UrlDecode(ep);
    if (raw.length < 12 + 16 + 1) throw new Error("epassword too short");
    var iv = raw.slice(0, 12);
    var ctAndTag = raw.slice(12);
    var key = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
    var ptBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ctAndTag);
    return new TextDecoder().decode(ptBuf);
  }

  // --- terminal line prompt (login / password / fingerprint) ---
  function termPrompt(label, opts) {
    opts = opts || {};
    return new Promise(function (resolve) {
      term.write("\r\n" + label);
      term.focus();
      var buf = "";
      var disp = rawOnData(function (data) {
        for (var i = 0; i < data.length; i++) {
          var ch = data[i];
          var code = data.charCodeAt(i);
          if (ch === "\r" || ch === "\n") {
            term.write("\r\n"); disp.dispose(); resolve(buf); return;
          } else if (code === 127 || code === 8) {
            if (buf.length > 0) { buf = buf.slice(0, -1); if (!opts.mask) term.write("\b \b"); }
          } else if (code === 3) {
            term.write("^C\r\n"); disp.dispose(); resolve(null); return;
          } else if (code >= 32) {
            buf += ch; term.write(opts.mask ? "*" : ch);
          }
        }
      });
    });
  }

  // --- callbacks invoked by main.wasm ---
  window.connected = function (status, home) {
    connectedFlag = true;
    reconnecting = false;
    term.focus();
    if (typeof window.changeWindowSize === "function") window.changeWindowSize(term.rows, term.cols);
    post({ type: "status", state: "connected", msg: status });
    if (initialCmd) setTimeout(function () { sshRun(initialCmd); }, 250);
  };
  window.showErr = function (msg) {
    term.write("\r\n\x1b[31m" + msg + "\x1b[0m\r\n");
    post({ type: "status", state: "error", msg: msg });
  };
  window.showReconnect = function (errMsg) {
    connectedFlag = false;
    keyCb = null;
    if (reconnecting) return;
    reconnecting = true;
    post({ type: "status", state: "disconnected", msg: errMsg });
    term.write("\r\n\x1b[33mConnection closed: " + errMsg + "\x1b[0m\r\n");
    termPrompt("Press Enter to reconnect (Ctrl-C to abort)...", {}).then(function (ans) {
      reconnecting = false;
      if (ans !== null) connect();
    });
  };
  window.showServerKey = function (fp) {
    termPrompt("RSA key fingerprint is " + fp + "\r\nContinue connecting (yes/no)? ", {}).then(function (ans) {
      var ok = ans !== null && /^y(es)?$/i.test(ans.trim());
      if (typeof window.acceptFingerprint === "function") window.acceptFingerprint(ok);
      if (!ok) term.write("\x1b[31mHost key rejected.\x1b[0m\r\n");
    });
  };
  // This page does not support WebAuthn; provide safe stubs in case they are
  // reached (they are only called when useWebauthn is true, which we never set).
  window.getSelectedWebauthnKey = function () { return null; };
  window.retrievePublicKey = function () { return Promise.reject("webauthn not supported in terminal view"); };

  // --- connection flow ---
  async function connect() {
    if (!host) {
      window.showErr("Missing required 'host' parameter.");
      return;
    }
    var pw = password;
    if (epassword && !password) {
      term.write("Decrypting credentials...\r\n");
      try { pw = await decryptEPassword(epassword); }
      catch (e) { window.showErr("Failed to decrypt epassword: " + (e.message || e)); return; }
    }
    var u = user;
    term.write("Connecting to " + host + " ...\r\n");
    if (!u) {
      u = await termPrompt("login as: ", {});
      if (!u) { term.write("Login cancelled.\r\n"); return; }
    }
    var needPass = !pw && !pk;
    if (needPass) {
      pw = await termPrompt(u + "@" + host + "'s password: ", { mask: true });
      if (pw === null) { term.write("Login cancelled.\r\n"); return; }
    }
    window.initConnection(
      term.rows, term.cols, host, Number(port), u, pw || "", pk,
      bypassProxy, bypassFingerprint, false
    );
  }
  window.__terminalConnect = connect;

  post({ type: "status", state: "loaded" });

  // --- boot the WASM SSH client, then connect ---
  var go = new Go();
  fetch("/main.wasm")
    .then(function (r) { return r.arrayBuffer(); })
    .then(function (bytes) { return WebAssembly.instantiate(bytes, go.importObject); })
    .then(function (res) {
      go.run(res.instance); // registers initConnection, acceptFingerprint, changeWindowSize, ...
      connect();
    })
    .catch(function (e) {
      window.showErr("Failed to load SSH client: " + (e.message || e));
    });
})();
    </script>
  </body>
</html>
